<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Enterprise Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .nav-link-custom { text-decoration: none; color: #6c757d; font-weight: 500; transition: 0.2s; }
        .nav-link-custom:hover { color: #212529; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-transparent mt-3">
    <div class="container">
        <a class="nav-link-custom" th:href="@{/home}">
            <i class="fas fa-arrow-left me-2"></i>Back to Home
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg">
                <div class="card-body p-4 text-center">
                    <h3 class="mb-4 fw-bold text-secondary">Sign In</h3>
                    
                    <div th:if="${param.error}" class="alert alert-danger small">
                        Invalid credentials or account pending approval.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info small">
                        You have been logged out.
                    </div>
                    <div th:if="${param.pending}" class="alert alert-warning small border-warning">
                        <i class="fas fa-clock me-2"></i>Registration successful! Wait for Admin approval.
                    </div>
                    <div th:if="${param.success}" class="alert alert-success small">
                        Account activated! Please login.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Login</button>
                    </form>

                    <hr class="my-4">
                    
                    <div class="text-center">
                        <span class="small text-muted">New here? <a th:href="@{/signup}" class="text-primary text-decoration-none fw-bold">Sign Up</a></span>
                        </div>
                </div>
            </div>
            
            <p class="text-center mt-4 text-muted small">
                &copy; 2026 Enterprise Admin Portal. All rights reserved.
            </p>
        </div>
    </div>
</div>
</body>
</html>
