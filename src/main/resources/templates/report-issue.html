<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Technical Issue | StaffLaunch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><a class="navbar-brand" th:href="@{/students/dashboard}"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a></div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white text-center py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-tools me-2"></i>Report Technical Issue</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/students/submit-issue}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Select Affected Asset</label>
                            <select name="asset" class="form-select" required>
                                <option value="">-- Choose Asset --</option>
                                <option th:if="${user.assets != null && user.assets != ''}" th:value="${user.assets}" th:text="${user.assets}"></option>
                                <option value="Other Internal System">Other Internal System (VPN, Portal)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Issue Category</label>
                            <select name="issueCategory" class="form-select" required>
                                <option value="">-- Categorize Issue --</option>
                                <option value="Hardware Malfunction">Hardware Malfunction</option>
                                <option value="Software/OS Bug">Software/OS Bug</option>
                                <option value="Network/Connectivity">Network/Connectivity</option>
                                <option value="Peripheral Replacement">Peripheral Replacement</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Elaborate on the Issue</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Please describe what went wrong..." required></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger w-50 fw-bold">Submit Report</button>
                            <button type="reset" class="btn btn-outline-secondary w-50 fw-bold">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
