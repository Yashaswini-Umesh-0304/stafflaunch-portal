<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${article.title} + ' | StaffLaunch'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hero-banner { 
            width: 100%; 
            height: 350px; 
            background-size: cover; 
            background-position: center; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .article-container { max-width: 800px; margin: 0 auto; background: white; padding: 50px; border-radius: 15px; margin-top: -80px; position: relative; z-index: 10; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .article-content { font-size: 1.1rem; line-height: 1.8; color: #4a4a4a; }
        .article-content h4 { color: #212529; font-weight: bold; margin-top: 30px; margin-bottom: 15px; }
        .article-content h5 { color: #212529; font-weight: 600; margin-top: 25px; margin-bottom: 10px; }
        .article-content ul, .article-content ol { margin-bottom: 20px; }
        .article-content li { margin-bottom: 10px; }
        .article-content blockquote { border-left: 5px solid #ffc107; padding-left: 20px; font-style: italic; color: #6c757d; margin: 30px 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/employees/dashboard}">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="hero-banner mb-4" th:style="'background-image: url(' + ${article.imageUrl} + ');'"></div>
        
        <div class="article-container">
            
            <div class="mb-4 pb-3 border-bottom text-center">
                <span th:if="${isRead}" class="badge bg-success mb-3 px-3 py-2 fs-6">Completed <i class="fas fa-check-circle ms-1"></i></span>
                <span th:if="${!isRead}" class="badge bg-warning text-dark mb-3 px-3 py-2 fs-6">Pending <i class="fas fa-clock ms-1"></i></span>
                
                <h1 class="fw-bold" th:text="${article.title}">Article Title</h1>
            </div>
            
            <div class="article-content" th:utext="${article.htmlContent}"></div>
            
            <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                <a th:href="@{/employees/resources/{prev}(prev=${prevSlug})}" class="btn btn-outline-secondary fw-bold px-4">
                    <i class="fas fa-chevron-left me-2"></i>Back
                </a>
                
                <form th:if="${!isRead}" th:action="@{/employees/resources/{slug}/mark-read(slug=${slug})}" method="post" class="m-0">
                    <button type="submit" class="btn btn-success fw-bold px-5">Mark as Read</button>
                </form>
                
                <button th:if="${isRead}" class="btn btn-success fw-bold px-5 disabled" style="opacity: 1;">
                    <i class="fas fa-check me-2"></i>Marked as Read
                </button>
                
                <a th:href="@{/employees/resources/{next}(next=${nextSlug})}" class="btn btn-outline-secondary fw-bold px-4">
                    Next<i class="fas fa-chevron-right ms-2"></i>
                </a>
            </div>
            
        </div>
    </div>

</body>
</html>
