<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Profile - Enterprise Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/students/list}"><i class="fas fa-edit me-2"></i>Profile Management</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg">
                <div class="card-header bg-warning text-dark py-3">
                    <h5 class="mb-0 text-center">Modify Employee Details</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">First Name</label>
                            <input type="text" th:field="*{firstName}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Last Name (Optional)</label>
                            <input type="text" th:field="*{lastName}" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Email / Username</label>
                            <input type="text" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-bold">Save Changes</button>
                            <a th:href="@{/students/list}" class="btn btn-outline-secondary">Discard Changes</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
