<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/employees/dashboard}"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
        </div>
    </nav>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0"><i class="fas fa-users me-2 text-primary"></i>Employee Directory</h3>
            <a th:href="@{/signup}" class="btn btn-primary fw-bold"><i class="fas fa-plus me-2"></i>Add New Employee</a>
        </div>
        
        <div class="card shadow-sm border-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Official Email</th>
                        <th>Phone</th>
                        <th>Allotted Assets</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee : ${employees}">
                        <td th:text="${employee.firstName}"></td>
                        <td th:text="${employee.lastName}"></td>
                        <td th:text="${employee.email}"></td>
                        <td th:text="${employee.phoneNumber}"></td>
                        <td th:text="${employee.assets}"></td>
                        <td class="text-center">
                            <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="fas fa-edit"></i> Edit</a>
                            
                            <a th:href="@{/employees/delete/{id}(id=${employee.id})}" 
                               th:classappend="${employee.username == 'admin'} ? 'disabled' : ''"
                               class="btn btn-sm btn-outline-danger">
                               <i class="fas fa-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
